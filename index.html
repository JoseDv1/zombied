<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Combate</title>
</head>
<body>
    <div id="ui">
        <h2>💀 Puntuación: <span id="score">0</span></h2>
    </div>

    <div id="controls">
        <b>Controles:</b><br>
        ⌨️ W,A,S,D o Flechas: Moverte<br>
        🖱️ Mouse: Apuntar y Disparar<br>
        💥 <b>E</b>: Explosión de Área<br>
        🧱 <b>Q</b>: Muro Defensivo
    </div>

    <div id="powers" style="position: absolute; bottom: 20px; right: 20px; pointer-events: none; text-align: right;">
        <b>Poderes:</b><br>
        <div id="powerE" style="margin-top: 5px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
            💥 Explosión (E) - <span id="cooldownE" style="color:#f1c40f;">¡Listo!</span>
        </div>
        <div id="powerQ" style="margin-top: 5px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
            🧱 Muro (Q) - <span id="cooldownQ" style="color:#f1c40f;">¡Listo!</span>
        </div>
    </div>

    <div id="gameOver">
        <h1>¡HAS MUERTO!</h1>
        <h2>Puntuación Final: <span id="finalScore">0</span></h2>
        <button id="restartButton">🔴 Jugar de Nuevo 🔫</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
